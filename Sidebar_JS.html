<script>
let candidateDict = {};
let jobDict = {};

window.onload = function() {
  google.script.run.withSuccessHandler(function(dict) {
    candidateDict = dict;
  }).getCandidateDict();

  if (MODE === 'NEW' || MODE === 'EDIT') {
    google.script.run.withSuccessHandler(function(schools) {
      let select = document.getElementById('school');
      if(select) {
        schools.forEach(function(school) {
          let opt = document.createElement('option');
          opt.value = school;
          opt.text = school;
          select.appendChild(opt);
        });
      }
    }).getSchoolList();
  }

  if (MODE === 'JOB') {
    google.script.run.withSuccessHandler(function(companies) {
      let datalist = document.getElementById('company_list');
      if(datalist) {
        companies.forEach(function(company) {
          let opt = document.createElement('option');
          opt.value = company;
          datalist.appendChild(opt);
        });
      }
    }).getCompanyList();
  }

  if (MODE === 'ADDINFO') {
    google.script.run.withSuccessHandler(function(agents) {
      let select = document.getElementById('add_agent');
      if(select) {
        agents.forEach(function(agent) {
          let opt = document.createElement('option');
          opt.value = agent;
          opt.text = agent;
          select.appendChild(opt);
        });
      }
    }).getAgentList();
  }

  if (MODE === 'HIRE') {
    google.script.run.withSuccessHandler(function(dict) {
      jobDict = dict;
    }).getJobDict();
  }
};

function formatId(rawId) {
  let numStr = rawId.replace(/[^0-9]/g, '');
  if (numStr.length > 0) {
    return "SD-" + numStr.padStart(4, '0');
  }
  return rawId;
}

function applyFormat(inputElem) {
  if (inputElem.value.trim() !== '') {
    inputElem.value = formatId(inputElem.value);
  }
}

function checkCandId(inputElem, displayId, isMultiple = false) {
  let rawVal = inputElem.value.trim();
  let displayElem = displayId ? document.getElementById(displayId) : inputElem.nextElementSibling;
  if (!displayElem) return;

  if (rawVal === '') {
    displayElem.innerText = '';
    return;
  }
  let formatted = formatId(rawVal);
  if (candidateDict[formatted]) {
    displayElem.innerText = candidateDict[formatted];
    displayElem.style.color = (MODE === 'DELETE') ? '#d93025' : '#1a73e8';
  } else {
    displayElem.innerText = '未登録のIDです';
    displayElem.style.color = '#d93025';
  }
}

function formatJobId(rawId) {
  let numStr = rawId.replace(/[^0-9]/g, '');
  if (numStr.length > 0) {
    return "JOB-" + numStr.padStart(4, '0');
  }
  return rawId;
}

function applyJobFormat(inputElem) {
  if (inputElem.value.trim() !== '') {
    inputElem.value = formatJobId(inputElem.value);
  }
}

function checkJobId(inputElem, displayId) {
  let rawVal = inputElem.value.trim();
  let displayElem = document.getElementById(displayId);
  if (!displayElem) return;

  if (rawVal === '') {
    displayElem.innerText = '';
    return;
  }
  let formatted = formatJobId(rawVal);
  if (jobDict[formatted]) {
    displayElem.innerText = jobDict[formatted];
    displayElem.style.color = '#34a853';
  } else {
    displayElem.innerText = '未登録の案件IDです';
    displayElem.style.color = '#d93025';
  }
}

function toggleRelative() {
  const sel = document.getElementById('relativeSelect');
  const det = document.getElementById('relativeDetail');
  if(sel && det) {
    if (sel.value === '有') {
      det.style.display = 'block';
    } else {
      det.style.display = 'none';
      det.value = '';
    }
  }
}

function showModal(msg, keepOpen) {
  document.getElementById('modal-text').innerText = msg;
  document.getElementById('overlay').style.display = 'flex';
  if (keepOpen) {
    document.querySelector('#modal-message button').style.display = 'none';
  } else {
    document.querySelector('#modal-message button').style.display = 'block';
  }
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
}

function searchData() {
  let rawId = document.getElementById('searchId').value.trim();
  if (!rawId) {
    showModal('管理番号を入力してください。');
    return;
  }
  let adminId = formatId(rawId);
  document.getElementById('searchId').value = adminId;
  
  document.getElementById('searchBtn').disabled = true;
  showModal('検索中...', true);
  
  google.script.run.withSuccessHandler(function(data) {
    closeModal();
    document.getElementById('searchBtn').disabled = false;
    if (data) {
      document.getElementById('targetRow').value = data.row;
      if (MODE === 'COMMENT') {
        document.getElementById('name').value = data.name;
        document.getElementById('comment').value = data.comment || "";
      } else {
        const fields = ['name','furigana','nickname','birthday','gender','spouse','height','weight',
                        'address','birthplace','email','school','eduSchool','eduDept','eduStatus',
                        'eduStart','eduEnd','eduNote','expPeriod1','expContent1','expPeriod2','expContent2',
                        'expPeriod3','expContent3','jlptLevel','jlptDate','jftLevel','jftDate',
                        'kaigoSkill','kaigoSkillDate','kaigoLang','kaigoLangDate','otherExam',
                        'otherExamDate','otherJapanese','otherJapaneseDate','comment'];
        fields.forEach(f => {
          let el = document.getElementById(f);
          if(el) {
            let val = data[f] || "";
            if(val.startsWith && val.startsWith("'")) val = val.substring(1);
            el.value = val;
          }
        });
        
        let relSel = document.getElementById('relativeSelect');
        let relDet = document.getElementById('relativeDetail');
        if (data.relative && data.relative !== "日本に家族や親戚はいません。" && data.relative !== "無" && data.relative !== "なし") {
          relSel.value = "有";
          relDet.value = data.relative;
          relDet.style.display = "block";
        } else {
          relSel.value = "無";
          relDet.value = "";
          relDet.style.display = "none";
        }
      }
      showModal(data.name + ' さんのデータを読み込みました。');
    } else {
      showModal('該当するデータが見つかりません。');
    }
  }).safeSearchByAdminId(adminId);
}

function searchDataAddInfo() {
  let rawId = document.getElementById('searchIdAddInfo').value.trim();
  if (!rawId) {
    showModal('管理番号を入力してください。');
    return;
  }
  let adminId = formatId(rawId);
  document.getElementById('searchIdAddInfo').value = adminId;
  
  showModal('検索中...', true);
  
  google.script.run.withSuccessHandler(function(data) {
    closeModal();
    if (data) {
      document.getElementById('targetRow').value = data.row;
      
      const fields = [
        'agent', 'offerDate', 'birthCity', 'addressDetail', 'passportNum', 'passportExp',
        'job', 'traineeExp', 'traineeCert', 'crime', 'applyCount', 'rejectCount',
        'overseasExp', 'travelCount', 'lastInDate', 'lastOutDate', 'relName2',
        'relRelation2', 'relBirth2', 'relCountry2', 'relLive2', 'relWork2', 'relCard2', 'memo'
      ];
      
      fields.forEach(f => {
        let el = document.getElementById('add_' + f);
        if(el) {
          let val = data[f] || "";
          if(typeof val === 'string' && val.startsWith("'")) val = val.substring(1);
          el.value = val;
        }
      });
      
      showModal(data.name + ' さんのデータを読み込みました。\n採用後の追加情報を入力してください。');
    } else {
      showModal('該当するデータが見つかりません。');
    }
  }).safeSearchByAdminId(adminId);
}

function submitAddInfo() {
  let row = document.getElementById('targetRow').value;
  if (!row) {
    showModal('先に管理番号で検索して、データを読み込んでください。');
    return;
  }
  
  let formData = { row: row };
  const fields = [
    'agent', 'offerDate', 'birthCity', 'addressDetail', 'passportNum', 'passportExp',
    'job', 'traineeExp', 'traineeCert', 'crime', 'applyCount', 'rejectCount',
    'overseasExp', 'travelCount', 'lastInDate', 'lastOutDate', 'relName2',
    'relRelation2', 'relBirth2', 'relCountry2', 'relLive2', 'relWork2', 'relCard2', 'memo'
  ];
  
  fields.forEach(f => {
    let el = document.getElementById('add_' + f);
    if (el) formData[f] = el.value;
  });
  
  showModal('保存中...', true);
  google.script.run.withSuccessHandler(function(msg) {
    showModal(msg);
  }).updateAddInfoRow(formData);
}

function submitData() {
  let formData = {};
  
  if (MODE === 'COMMENT') {
    let row = document.getElementById('targetRow').value;
    if (!row) {
      showModal('先に管理番号で検索してください。');
      return;
    }
    formData.row = row;
    formData.comment = document.getElementById('comment').value;
  } else {
    const fields = ['name','furigana','nickname','birthday','gender','spouse','height','weight',
                    'address','birthplace','email','school','eduSchool','eduDept','eduStatus',
                    'eduStart','eduEnd','eduNote','expPeriod1','expContent1','expPeriod2','expContent2',
                    'expPeriod3','expContent3','jlptLevel','jlptDate','jftLevel','jftDate',
                    'kaigoSkill','kaigoSkillDate','kaigoLang','kaigoLangDate','otherExam',
                    'otherExamDate','otherJapanese','otherJapaneseDate','comment'];
    fields.forEach(f => {
      let el = document.getElementById(f);
      if(el) formData[f] = el.value;
    });

    let relSel = document.getElementById('relativeSelect');
    let relDet = document.getElementById('relativeDetail');
    if (relSel && relDet) {
      formData.relative = (relSel.value === '有') ? relDet.value : "日本に家族や親戚はいません。";
    }

    if (MODE === 'EDIT') {
      formData.row = document.getElementById('targetRow').value;
      if (!formData.row) {
        showModal('先に管理番号で検索してください。');
        return;
      }
    }
  }

  let fileInput = document.getElementById('imageFile');
  if (fileInput && fileInput.files.length > 0) {
    let file = fileInput.files[0];
    let reader = new FileReader();
    reader.onload = function(e) {
      formData.imageFile = {
        name: file.name,
        mimeType: file.type,
        contents: e.target.result.split(',')[1] 
      };
      sendData(formData);
    };
    reader.readAsDataURL(file);
  } else {
    sendData(formData);
  }
}

function sendData(formData) {
  document.getElementById('mainBtn').disabled = true;
  showModal('処理中...', true);
  
  if (MODE === 'NEW') {
    google.script.run.withSuccessHandler(onSuccess).addNewRow(formData);
  } else {
    google.script.run.withSuccessHandler(onSuccess).updateRow(formData);
  }
}

function onSuccess(msg) {
  document.getElementById('mainBtn').disabled = false;
  showModal(msg);
  if (MODE === 'NEW') {
    let inputs = document.querySelectorAll('input[type="text"], input[type="date"], input[type="number"], input[type="email"], textarea');
    inputs.forEach(input => input.value = '');
    let selects = document.querySelectorAll('select');
    selects.forEach(select => select.selectedIndex = 0);
    let fileInput = document.getElementById('imageFile');
    if (fileInput) fileInput.value = '';
    document.getElementById('relativeDetail').style.display = 'none';
  }
}

function submitCompany() {
  let name = document.getElementById('comp_name').value.trim();
  if (!name) {
    showModal('事業者名称は必須です。');
    return;
  }
  
  let formData = {
    name: name,
    yomi: document.getElementById('comp_yomi').value,
    address: document.getElementById('comp_address').value,
    url: document.getElementById('comp_url').value,
    note: document.getElementById('comp_note').value
  };
  
  document.getElementById('compBtn').disabled = true;
  showModal('登録中...', true);
  google.script.run.withSuccessHandler(function(msg) {
    document.getElementById('compBtn').disabled = false;
    showModal(msg);
    document.querySelectorAll('#form-company input, #form-company textarea').forEach(el => el.value = '');
    document.getElementById('comp_warning').style.display = 'none';
  }).addCompany(formData);
}

function liveCheckDuplicate(name) {
  let warningBox = document.getElementById('comp_warning');
  if (!name.trim()) {
    warningBox.style.display = 'none';
    return;
  }
  google.script.run.withSuccessHandler(function(isDup) {
    warningBox.style.display = isDup ? 'block' : 'none';
  }).checkCompanyDuplicate(name);
}

function addJobCandRow() {
  let container = document.getElementById('job_cand_list');
  let div = document.createElement('div');
  div.className = 'sub-field';
  div.innerHTML = '<input type="text" class="job-cand-id" placeholder="例: 1" oninput="checkCandId(this, null, true)" onblur="applyFormat(this)"><span class="cand-name-display"></span>';
  container.appendChild(div);
}

// ★修正：案件登録時に新しいデータもまとめて送る
function submitJob() {
  let company = document.getElementById('job_company').value.trim();
  if (!company) {
    showModal('事業者名を入力してください。');
    return;
  }
  
  let candInputs = document.querySelectorAll('.job-cand-id');
  let candidates = [];
  candInputs.forEach(input => {
    let val = input.value.trim();
    if (val) candidates.push(formatId(val));
  });
  
  if (candidates.length === 0) {
    showModal('候補者を少なくとも1名入力してください。');
    return;
  }
  
  // 新しい入力項目の取得
  let formData = {
    company: company,
    candidates: candidates,
    interviewDate: document.getElementById('job_interviewDate').value,
    relatedFile: document.getElementById('job_relatedFile').value,
    memo: document.getElementById('job_memo').value
  };
  
  document.getElementById('jobBtn').disabled = true;
  showModal('案件を登録中...', true);
  
  google.script.run.withSuccessHandler(function(msg) {
    document.getElementById('jobBtn').disabled = false;
    showModal(msg);
    // 送信後のクリア処理
    document.getElementById('job_company').value = '';
    document.getElementById('job_interviewDate').value = '';
    document.getElementById('job_relatedFile').value = '';
    document.getElementById('job_memo').value = '';
    document.getElementById('job_cand_list').innerHTML = '<div class="sub-field"><input type="text" class="job-cand-id" placeholder="例: 1" oninput="checkCandId(this, null, true)" onblur="applyFormat(this)"><span class="cand-name-display"></span></div>';
  }).addJob(formData);
}

function submitDelete() {
  let rawId = document.getElementById('delete_id').value.trim();
  if (!rawId) {
    showModal('削除するIDを入力してください。');
    return;
  }
  
  let adminId = formatId(rawId);
  if (!confirm(adminId + " のデータを完全に削除します。よろしいですか？")) {
    return;
  }
  
  showModal('削除中...', true);
  google.script.run.withSuccessHandler(function(msg) {
    showModal(msg);
    document.getElementById('delete_id').value = '';
    document.getElementById('deleteNameDisplay').innerText = '';
  }).deleteCandidate(adminId);
}

function fetchJobCandidates(mode) {
  let rawId = document.getElementById(mode + '_job_id').value.trim();
  if (!rawId) {
    showModal('案件IDを入力してください。');
    return;
  }
  let jobId = formatJobId(rawId);
  document.getElementById(mode + '_job_id').value = jobId;
  
  showModal('候補者を取得中...', true);
  google.script.run.withSuccessHandler(function(candidates) {
    closeModal();
    let container = document.getElementById(mode + '_cand_list');
    if (!candidates || candidates.length === 0) {
      container.innerHTML = '<div style="color:#d93025; font-size:12px;">候補者が見つかりません。案件IDを確認してください。</div>';
      return;
    }
    
    let html = '';
    candidates.forEach(c => {
      html += `<label style="display:flex; align-items:center; margin-bottom:8px; font-size:14px; cursor:pointer;">
                 <input type="checkbox" class="${mode}-cand-checkbox" value="${c.id}" style="margin:0 8px 0 0; width:16px; height:16px; flex-shrink:0;">
                 <span style="line-height:1.2;">${c.display}</span>
               </label>`;
    });
    container.innerHTML = html;
  }).getJobCandidates(jobId);
}

function submitHire() {
  let rawId = document.getElementById('hire_job_id').value.trim();
  if (!rawId) {
    showModal('案件IDを入力してください。');
    return;
  }
  let jobId = formatJobId(rawId);
  
  let checkboxes = document.querySelectorAll('.hire-cand-checkbox');
  if (checkboxes.length === 0) {
    showModal('先に「候補者検索」を行ってください。');
    return;
  }
  
  let hiredIds = [];
  checkboxes.forEach(cb => {
    if (cb.checked) hiredIds.push(cb.value);
  });
  
  if (!confirm(`選択した ${hiredIds.length} 名を「採用」として登録します。よろしいですか？`)) {
    return;
  }
  
  document.getElementById('hireBtn').disabled = true;
  showModal('採用登録を実行中...', true);
  
  google.script.run.withSuccessHandler(function(msg) {
    document.getElementById('hireBtn').disabled = false;
    showModal(msg);
    document.getElementById('hire_job_id').value = '';
    document.getElementById('hireJobDisplay').innerText = '';
    document.getElementById('hire_cand_list').innerHTML = '<div style="font-size: 12px; color: #888;">-- 上の検索ボタンを押してください --</div>';
  }).registerHire(jobId, hiredIds);
}

function addListCandRow() {
  let container = document.getElementById('list_cand_inputs');
  let div = document.createElement('div');
  div.className = 'sub-field';
  div.innerHTML = '<input type="text" class="list-cand-id" placeholder="例: 1" oninput="checkCandId(this, null, true)" onblur="applyFormat(this)"><span class="cand-name-display"></span>';
  container.appendChild(div);
}

function submitList() {
  let candInputs = document.querySelectorAll('.list-cand-id');
  let candidates = [];
  candInputs.forEach(input => {
    let val = input.value.trim();
    if (val) candidates.push(formatId(val));
  });
  
  if (candidates.length === 0) {
    showModal('候補者を少なくとも1名入力してください。');
    return;
  }
  
  document.getElementById('listBtn').disabled = true;
  showModal('簡易リストを作成中...', true);
  
  google.script.run.withSuccessHandler(function(msg) {
    document.getElementById('listBtn').disabled = false;
    showModal(msg);
  }).generateSimpleList(candidates);
}
</script>
