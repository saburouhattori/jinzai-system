<script>
// =========================================
// 候補者管理用 JavaScript
// =========================================

// --- 初期化 ---
function initCandidateForm() {
  showLoading();
  google.script.run
    .withSuccessHandler(function(lists) {
      populateSelect('agent', lists.agent);
      populateSelect('school', lists.school);
      populateSelect('hiredBy', lists.company);
      hideLoading();
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showError("初期化エラー: " + err.message);
    })
    .getListsForCandidate();
}

function populateSelect(id, list) {
  const elem = document.getElementById(id);
  if (!elem) return;
  const currentValue = elem.value;
  elem.innerHTML = '<option value="">未選択</option>';
  list.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item;
    opt.textContent = item;
    elem.appendChild(opt);
  });
  if (currentValue) elem.value = currentValue;
}

// --- データの収集 ---
function collectCandidateFormData() {
  // ★修正：要素が存在しない(null)場合でもエラーで止まらずに空文字を返す安全な関数
  const getVal = (id) => document.getElementById(id) ? document.getElementById(id).value : '';
  
  return {
    id: getVal('candId'),
    name: getVal('candName'),
    kana: getVal('candKana'),
    nickname: getVal('candNickname'),
    birthday: getVal('birthday'),
    gender: getVal('gender'),
    marriage: getVal('marriage'),
    height: getVal('height'),
    weight: getVal('weight'),
    address: getVal('address'),
    origin: getVal('origin'),
    email: getVal('email'),
    school: getVal('school'),
    eduName: getVal('eduName'),
    eduMajor: getVal('eduMajor'),
    eduStatus: getVal('eduStatus'),
    eduStart: getVal('eduStart'),
    eduEnd: getVal('eduEnd'),
    eduMemo: getVal('eduMemo'),
    work1Period: getVal('work1Period'),
    work1Detail: getVal('work1Detail'),
    work2Period: getVal('work2Period'),
    work2Detail: getVal('work2Detail'),
    work3Period: getVal('work3Period'),
    work3Detail: getVal('work3Detail'),
    jlpt: getVal('jlpt'),
    jlptDate: getVal('jlptDate'),
    jft: getVal('jft'),
    jftDate: getVal('jftDate'),
    kaigoG: getVal('kaigoG'),
    kaigoGDate: getVal('kaigoGDate'),
    kaigoN: getVal('kaigoN'),
    kaigoNDate: getVal('kaigoNDate'),
    otherTest: getVal('otherTest'),
    otherTestDate: getVal('otherTestDate'),
    otherSkill: getVal('otherSkill'),
    otherSkillDate: getVal('otherSkillDate'),
    family: getVal('family'),
    interviewHist: getVal('interviewHist'),
    memo: getVal('memo'),
    status: getVal('status'),
    hiredBy: getVal('hiredBy'),
    skillField: getVal('skillField'),
    agent: getVal('agent'),
    regDate: getVal('regDate'),
    hireDate: getVal('hireDate'),
    birthPlace: getVal('birthPlace'),
    addressDetail: getVal('addressDetail'),
    passportNo: getVal('passportNo'),
    passportExp: getVal('passportExp'),
    job: getVal('job'),
    expJissyu: getVal('expJissyu'),
    certJissyu: getVal('certJissyu'),
    crime: getVal('crime'),
    visaApplyCount: getVal('visaApplyCount'),
    visaRejectCount: getVal('visaRejectCount'),
    overseasHist: getVal('overseasHist'),
    overseasCount: getVal('overseasCount'),
    lastEntry: getVal('lastEntry'),
    lastExit: getVal('lastExit'),
    relName: getVal('relName'),
    relType: getVal('relType'),
    relBirth: getVal('relBirth'),
    relNat: getVal('relNat'),
    relLive: getVal('relLive'),
    relWork: getVal('relWork'),
    relCard: getVal('relCard'),
    generalMemo: getVal('generalMemo'),
    row: getVal('candRow')
  };
}

// --- 新規登録 ---
function submitCandidate() {
  if (!document.getElementById('candName').value) {
    showError("名前は必須です。");
    return;
  }
  showLoading();
  const formData = collectCandidateFormData();
  
  google.script.run
    .withSuccessHandler(function(msg) {
      hideLoading();
      showSuccess(msg);
      clearCandidateForm();
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showError(err.message);
    })
    .addCandidate(formData);
}

// --- 更新 ---
function updateCandidateData() {
  if (!document.getElementById('candRow').value) {
    showError("更新対象が選択されていません。検索からやり直してください。");
    return;
  }
  showLoading();
  const formData = collectCandidateFormData();
  
  google.script.run
    .withSuccessHandler(function(msg) {
      hideLoading();
      showSuccess(msg);
      switchTab('tab-candidate-search');
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showError(err.message);
    })
    .updateCandidate(formData);
}

// --- 検索 ---
function searchCandidateDetails() {
  const candId = document.getElementById('searchCandId').value;
  if (!candId) {
    showError("登録者IDを入力してください。");
    return;
  }
  showLoading();
  google.script.run
    .withSuccessHandler(function(data) {
      hideLoading();
      if (!data) {
        showError("指定されたIDの登録者は見つかりませんでした。");
        return;
      }
      
      const setVal = (id, val) => { if(document.getElementById(id)) document.getElementById(id).value = val || ''; };
      
      setVal('candRow', data.row);
      setVal('candId', data.id);
      setVal('candName', data.name);
      setVal('candKana', data.kana);
      setVal('candNickname', data.nickname);
      setVal('birthday', data.birthday);
      setVal('gender', data.gender);
      setVal('marriage', data.marriage);
      setVal('height', data.height);
      setVal('weight', data.weight);
      setVal('address', data.address);
      setVal('origin', data.origin);
      setVal('email', data.email);
      setVal('school', data.school);
      setVal('eduName', data.eduName);
      setVal('eduMajor', data.eduMajor);
      setVal('eduStatus', data.eduStatus);
      setVal('eduStart', data.eduStart);
      setVal('eduEnd', data.eduEnd);
      setVal('eduMemo', data.eduMemo);
      setVal('work1Period', data.work1Period);
      setVal('work1Detail', data.work1Detail);
      setVal('work2Period', data.work2Period);
      setVal('work2Detail', data.work2Detail);
      setVal('work3Period', data.work3Period);
      setVal('work3Detail', data.work3Detail);
      setVal('jlpt', data.jlpt);
      setVal('jlptDate', data.jlptDate);
      setVal('jft', data.jft);
      setVal('jftDate', data.jftDate);
      setVal('kaigoG', data.kaigoG);
      setVal('kaigoGDate', data.kaigoGDate);
      setVal('kaigoN', data.kaigoN);
      setVal('kaigoNDate', data.kaigoNDate);
      setVal('otherTest', data.otherTest);
      setVal('otherTestDate', data.otherTestDate);
      setVal('otherSkill', data.otherSkill);
      setVal('otherSkillDate', data.otherSkillDate);
      setVal('family', data.family);
      setVal('interviewHist', data.interviewHist);
      setVal('memo', data.memo);
      setVal('status', data.status);
      setVal('hiredBy', data.hiredBy);
      setVal('skillField', data.skillField);
      setVal('agent', data.agent);
      setVal('regDate', data.regDate);
      setVal('hireDate', data.hireDate);
      setVal('birthPlace', data.birthPlace);
      setVal('addressDetail', data.addressDetail);
      setVal('passportNo', data.passportNo);
      setVal('passportExp', data.passportExp);
      setVal('job', data.job);
      setVal('expJissyu', data.expJissyu);
      setVal('certJissyu', data.certJissyu);
      setVal('crime', data.crime);
      setVal('visaApplyCount', data.visaApplyCount);
      setVal('visaRejectCount', data.visaRejectCount);
      setVal('overseasHist', data.overseasHist);
      setVal('overseasCount', data.overseasCount);
      setVal('lastEntry', data.lastEntry);
      setVal('lastExit', data.lastExit);
      setVal('relName', data.relName);
      setVal('relType', data.relType);
      setVal('relBirth', data.relBirth);
      setVal('relNat', data.relNat);
      setVal('relLive', data.relLive);
      setVal('relWork', data.relWork);
      setVal('relCard', data.relCard);
      setVal('generalMemo', data.generalMemo);

      document.getElementById('btn-add-cand').style.display = 'none';
      document.getElementById('btn-update-cand').style.display = 'inline-block';
      document.getElementById('btn-delete-cand').style.display = 'inline-block';
      
      switchTab('tab-candidate-form');
      showSuccess("データを読み込みました。");
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showError(err.message);
    })
    .getCandidateDetails(candId);
}

// --- 削除 ---
function confirmDeleteCandidate() {
  const candId = document.getElementById('candId').value;
  if (!candId) return;
  if (!confirm(`登録者 ${candId} を削除してもよろしいですか？この操作は取り消せません。`)) {
    return;
  }
  showLoading();
  google.script.run
    .withSuccessHandler(function(msg) {
      hideLoading();
      showSuccess(msg);
      clearCandidateForm();
      switchTab('tab-candidate-search');
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showError(err.message);
    })
    .deleteCandidateRow(candId);
}

// --- クリア ---
function clearCandidateForm() {
  document.querySelectorAll('#candidate-form input, #candidate-form select, #candidate-form textarea').forEach(el => el.value = '');
  document.getElementById('btn-add-cand').style.display = 'inline-block';
  document.getElementById('btn-update-cand').style.display = 'none';
  document.getElementById('btn-delete-cand').style.display = 'none';
  
  // 今日の日付をセット
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  if(document.getElementById('regDate')) {
    document.getElementById('regDate').value = `${yyyy}-${mm}-${dd}`;
  }
}
</script>
