<div id="form-company" style="display: none;">
<div class="section-title" >事業者マスタ登録</div>
<p style="font-size: 11px; color: #555; margin-top: -5px; margin-bottom: 15px;">※案件登録から遷移した場合、名称が自動入力されます。</p>

<div class="form-row">
  <div class="field flex-2">
    <label>事業者名称 <span style="color:red">*</span></label>
    <input type="text" id="comp_name" placeholder="例：株式会社〇〇" oninput="liveCheckDuplicate(this.value)">
    <div id="comp_warning" style="display:none; color:#d93025; font-size:11px; margin-top:4px;">
      ⚠️ この名称は既にマスタに登録されています。
    </div>
  </div>
  <div class="field flex-2">
    <label>ヨミガナ</label>
    <input type="text" id="comp_yomi" placeholder="例：カブシキガイシャマルマル">
  </div>
</div>

<div class="field">
  <label>所在地</label>
  <input type="text" id="comp_address" placeholder="例：東京都千代田区...">
</div>

<div class="field">
  <label>ホームページURL</label>
  <input type="url" id="comp_url" placeholder="https://...">
</div>

<div class="field">
  <label>備考</label>
  <textarea id="comp_note" rows="3"></textarea>
</div>

<div style="text-align: center; margin-top: 25px;">
  <button class="btn-primary" id="compBtn" onclick="submitCompany()" style="width: 250px;">事業者マスタを保存</button>
</div>
</div>
