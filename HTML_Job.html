<div id="form-job" style="display: <?= mode === 'JOB' ? 'block' : 'none' ?>;">
<div class="section-title" >案件登録</div>

<div class="field">
  <label>ステータス</label>
  <select id="job_status">
    <option value="未着手">未着手</option>
    <option value="面接準備">面接準備</option>
  </select>
</div>

<div class="field">
  <label>事業者名（文字を入力すると候補が出ます）</label>
  <input type="text" id="job_company" list="company_list" placeholder="例：株式会社〇〇（新規も可）">
  <datalist id="company_list"></datalist>
</div>

<div class="field">
  <label>技能分野</label>
  <select id="job_skill">
    <option value="">未選択</option>
    <option value="介護">介護</option>
    <option value="外食業">外食業</option>
    <option value="飲食料品製造業">飲食料品製造業</option>
  </select>
</div>

<div class="field" >
  <label>候補者（登録者IDを入力）</label>
  <p style="font-size: 11px; color: #555; margin-top: -3px; margin-bottom: 8px;">※候補者を変更する場合は、枠内のIDを直接書き換えてください。名前は自動で表示されます。</p>
  <div id="job_cand_list">
    </div>
  <button class="btn-secondary" onclick="addJobCandRow()" style="margin-top:5px; font-size:11px; padding: 6px; width: auto;">+ 候補者IDを追加</button>
</div>

<div class="form-row">
  <div class="field">
    <label>面接日</label>
    <input type="date" id="job_interviewDate" style="max-width: 200px;">
  </div>
</div>

<div class="field">
  <label>関連ファイル（Googleドライブ）</label>
  <div id="job_file_list">
    </div>
  <button class="btn-secondary" onclick="addJobFileRow('job')" style="margin-top:5px; font-size:11px; padding: 6px; width: auto;">+ 関連ファイルを追加</button>
</div>

<div class="field">
  <label>備考・メモ</label>
  <textarea id="job_memo" rows="3"></textarea>
</div>

<button class="btn-primary" id="jobBtn" onclick="submitJob()" >登録</button>
</div>

      <input type="text" id="edit_job_searchId" placeholder="例: 1 または 0001" onblur="applyJobFormat(this)" style="flex: 2;">

    <div class="form-row">
      <div class="field">
        <label>ステータス</label>
        <select id="edit_job_status">
          <option value="未着手">未着手</option>
          <option value="面接待ち">面接待ち</option>
          <option value="入国準備">入国準備</option>

          <option value="キャンセル">キャンセル</option>

      </div>
      <div class="field flex-2">
        <label>事業者名</label>
        <input type="text" id="edit_job_company" list="company_list">

    <div class="field">
      <label>技能分野</label>
      <select id="edit_job_skill">

        <option value="介護">介護</option>

    <div class="field">
      <label>候補者（登録者IDを入力）</label>
      <p style="font-size: 11px; color: #555; margin-top: -3px; margin-bottom: 8px;">※候補者を変更する場合は、枠内のIDを直接書き換えてください。名前は自動で表示されます。</p>
      <div id="edit_job_cand_list">
        </div>
      <button class="btn-secondary" onclick="addJobEditCandRow()" style="margin-top:5px; font-size:11px; padding: 6px; width: auto;">+ 候補者IDを追加</button>
    </div>

    <div class="form-row">
      <div class="field">
        <label>面接日</label>
        <input type="date" id="edit_job_interviewDate" style="max-width: 200px;">

    <div class="field">
      <label>備考・メモ</label>
      <textarea id="edit_job_memo" rows="3"></textarea>
    </div>

    <div style="display: flex; gap: 15px; margin-top: 20px;">
      <button class="btn-primary" onclick="submitJobEdit()" style="flex: 2;">更新を保存</button>
      <button class="btn-primary" onclick="submitJobDelete()" style="flex: 1; background: #d93025;">案件を削除</button>
    </div>
  </div>
</div>


<div id="form-hire" style="display: <?= mode === 'HIRE' ? 'block' : 'none' ?>;">
<div class="section-title" style="border-left-color: #34a853;">面接結果登録</div>
<div class="field">
  <label>採用元の案件ID</label>
  <div style="display: flex; gap: 10px;">
    <input type="text" id="hire_job_id" placeholder="例: 1 または 0001" oninput="checkJobId(this, 'hireJobDisplay')" onblur="applyJobFormat(this)" style="flex: 2;">

  </div>
  <div id="hireJobDisplay" style="font-size:11px; color:#34a853; margin-top:4px; height:14px;"></div>
</div>
<div class="field">
<label>採用された候補者（複数選択可）</label>
<div id="hire_cand_list" style="padding: 10px; border: 1px solid #ced4da; border-radius: 4px; background: #f8f9fa;">
  <div style="font-size: 12px; color: #888;">-- 上の検索ボタンを押してください --</div>
</div>
</div>

<div class="field" style="margin-top: 15px;">
  <label style="display: flex; align-items: center; cursor: pointer; font-weight: bold; color: #d93025;">

    今回の面接では「採用者なし」として結果を登録する
  </label>
</div>

<div style="text-align: center; margin-top: 20px;">
  <button class="btn-primary" id="hireBtn" style="background: #34a853; width: 200px;" onclick="submitHire()" >面接結果を登録</button>
</div>
<p style="font-size: 11px; color: #555; margin-top: 10px; text-align: center;">※案件管理とマスタシートのステータス・面接履歴が更新されます。</p>
</div>

<div class="field" >

<p style="font-size: 11px; color: #555; margin-top: -3px; margin-bottom: 8px;">※候補者を変更する場合は、枠内のIDを直接書き換えてください。名前は自動で表示されます。</p>

  window.addEventListener('DOMContentLoaded', () => {
    if (MODE === 'JOB') {
      addJobCandRow();
      addJobFileRow('job');

    if (MODE === 'LIST') addListCandRow();
  });
